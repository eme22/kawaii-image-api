<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Internal Server Error - Kawaii Api" />
        <title>500 - Server Error | Kawaii Api</title>
        <link href="/css/styles.css" rel="stylesheet" />
        <link href="/css/custom.css" rel="stylesheet" />
        <script src="https://use.fontawesome.com/releases/v6.1.0/js/all.js" crossorigin="anonymous"></script>
    </head>
    <body class="error-page">
        <div class="error-layout">
            <!-- Navbar -->
            <nav class="error-nav">
                <a class="error-nav-brand" href="/">
                    <img src="/assets/img/waifu.png" alt="Kawaii Api Logo">
                    Kawaii Api
                </a>
            </nav>

            <!-- Content -->
            <div class="error-content">
                <div class="error-card">
                    <img src="/assets/img/cloading.gif" alt="500 Error" class="error-image">
                    <div class="error-code">500</div>
                    <h1 class="error-title">Internal Server Error</h1>
                    <p class="error-description">
                        Something went wrong on our end.<br>
                        We're working on it — please try again in a moment.
                    </p>
                    <a href="/" class="btn btn-kawaii">
                        <i class="fas fa-arrow-left me-2"></i>Return to Home
                    </a>
                </div>
            </div>

            <!-- Footer -->
            <footer class="error-footer">
                Copyright &copy; 2026 eme22. Licensed under ISC
            </footer>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    </body>
</html>
