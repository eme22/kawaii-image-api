<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Unauthorized - Kawaii Api" />
        <title>401 - Unauthorized | Kawaii Api</title>
        <link href="/css/styles.css" rel="stylesheet" />
        <link href="/css/custom.css" rel="stylesheet" />
        <script src="https://use.fontawesome.com/releases/v6.1.0/js/all.js" crossorigin="anonymous"></script>
    </head>
    <body class="error-page">
        <div class="error-layout">
            <!-- Navbar -->
            <nav class="error-nav">
                <a class="error-nav-brand" href="/">
                    <img src="/assets/img/waifu.png" alt="Kawaii Api Logo">
                    Kawaii Api
                </a>
            </nav>

            <!-- Content -->
            <div class="error-content">
                <div class="error-card">
                    <div style="font-size: 5rem; margin-bottom: 1rem;">🔒</div>
                    <div class="error-code">401</div>
                    <h1 class="error-title">Unauthorized</h1>
                    <p class="error-description">
                        You need to be logged in to access this resource.<br>
                        Please sign in with Discord to continue.
                    </p>
                    <div class="d-flex gap-3 justify-content-center flex-wrap">
                        <a href="/auth/discord" class="btn btn-kawaii">
                            <i class="fab fa-discord me-2"></i>Login with Discord
                        </a>
                        <a href="/" class="btn btn-outline-secondary" style="border-radius: 2rem; font-size: 0.82rem; font-weight: 600;">
                            <i class="fas fa-arrow-left me-2"></i>Return to Home
                        </a>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="error-footer">
                Copyright &copy; 2026 eme22. Licensed under ISC
            </footer>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    </body>
</html>
